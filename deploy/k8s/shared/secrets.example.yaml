apiVersion: v1
kind: Secret
metadata:
  name: qlxion-secrets
  namespace: qlxion
type: Opaque
stringData:
  jwt-secret: "change-this-to-a-secure-random-string"
  db-user: "postgres"
  db-password: "postgres"
  redis-password: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qlxion-config
  namespace: qlxion
data:
  GATEWAY_PORT: "8000"
  AUTH_SERVICE_PORT: "8001"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "auth_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RATE_LIMIT_ENABLED: "true"
  CORS_ENABLED: "true"
