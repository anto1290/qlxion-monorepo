services:
  # ============================================
  # PostgreSQL - Auth Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: qlxion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-auth_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../services/auth-service/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qlxion-network

  # ============================================
  # Redis - Cache & Session Store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: qlxion-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qlxion-network

  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: qlxion-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8000
      GATEWAY_NAME: qlxion-gateway
      GATEWAY_DEBUG: ${GATEWAY_DEBUG:-false}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      CORS_ENABLED: ${CORS_ENABLED:-true}
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 8001
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - qlxion-network

  # ============================================
  # Auth Service
  # ============================================
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: qlxion-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    environment:
      AUTH_SERVICE_HOST: 0.0.0.0
      AUTH_SERVICE_PORT: 8001
      AUTH_SERVICE_DEBUG: ${AUTH_SERVICE_DEBUG:-false}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-auth_db}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - qlxion-network

volumes:
  postgres_data:
    name: qlxion-postgres-data
  redis_data:
    name: qlxion-redis-data

networks:
  qlxion-network:
    name: qlxion-network
    driver: bridge
